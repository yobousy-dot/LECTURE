<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecteur de texte français</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 250px;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      resize: vertical;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .play {
      background: #28a745;
      color: white;
    }

    .pause {
      background: #ffc107;
      color: black;
    }

    .stop {
      background: #dc3545;
      color: white;
    }

    .file {
      background: #007bff;
      color: white;
    }

    .slider-container {
      margin-top: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
    }

    .info {
      margin-top: 20px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lecteur de texte français</h1>

    <textarea id="text" placeholder="Colle ton texte ici..."></textarea>

    <div class="controls">
      <button class="play" onclick="playText()">▶ Lecture</button>
      <button class="pause" onclick="pauseText()">⏸ Pause</button>
      <button class="stop" onclick="stopText()">⏹ Stop</button>

      <label class="file">
        Importer un fichier TXT
        <input type="file" id="fileInput" accept=".txt" hidden>
      </label>
    </div>

    <div class="slider-container">
      <label for="speed">Vitesse de lecture</label>
      <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
    </div>

    <div class="info">
      Fonctionne sans API externe grâce à la synthèse vocale intégrée du navigateur.
    </div>
  </div>

  <script>
    let speech;

    function playText() {
      stopText();

      const text = document.getElementById('text').value;
      const speed = document.getElementById('speed').value;

      if (!text.trim()) {
        alert('Veuillez entrer un texte.');
        return;
      }

      speech = new SpeechSynthesisUtterance(text);
      speech.lang = 'fr-FR';
      speech.rate = speed;

      const voices = speechSynthesis.getVoices();
      const frenchVoice = voices.find(v => v.lang.includes('fr'));

      if (frenchVoice) {
        speech.voice = frenchVoice;
      }

      speechSynthesis.speak(speech);
    }

    function pauseText() {
      speechSynthesis.pause();
    }

    function stopText() {
      speechSynthesis.cancel();
    }

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        document.getElementById('text').value = e.target.result;
      };

      reader.readAsText(file);
    });

    speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.getVoices();
    };
  </script>
</body>
</html>
