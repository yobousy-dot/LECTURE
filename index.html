<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecteur de Texte Français</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: #1f2937;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #60a5fa;
    }

    textarea {
      width: 100%;
      height: 250px;
      border: none;
      border-radius: 12px;
      padding: 16px;
      resize: vertical;
      font-size: 16px;
      background: #374151;
      color: white;
      outline: none;
    }

    .controls {
      margin-top: 20px;
      display: grid;
      gap: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .play {
      background: #22c55e;
      color: white;
    }

    .pause {
      background: #f59e0b;
      color: white;
    }

    .stop {
      background: #ef4444;
      color: white;
    }

    select, input[type="range"] {
      width: 100%;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #d1d5db;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lecteur de Texte Français</h1>

    <textarea id="text" placeholder="Écris ou colle ton texte ici..."></textarea>

    <div class="controls">
      <div>
        <label for="voice">Voix française</label>
        <select id="voice"></select>
      </div>

      <div>
        <label for="speed">Vitesse de lecture</label>
        <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
      </div>

      <div class="row">
        <button class="play" onclick="playText()">▶ Lecture</button>
        <button class="pause" onclick="pauseText()">⏸ Pause</button>
        <button class="stop" onclick="stopText()">⏹ Stop</button>
      </div>
    </div>

    <div class="footer">
      Fonctionne sans API grâce à la synthèse vocale intégrée du navigateur.
    </div>
  </div>

  <script>
let speech;
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
}

loadVoices();

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function playText() {
  speechSynthesis.cancel();

  const text = document.getElementById('text').value;
  const speed = document.getElementById('speed').value;

  if (!text.trim()) {
    alert('Veuillez entrer un texte.');
    return;
  }

  speech = new SpeechSynthesisUtterance(text);
  speech.lang = 'fr-FR';
  speech.rate = speed;

  const frenchVoice = voices.find(v =>
    v.lang.toLowerCase().startsWith('fr')
  );

  if (frenchVoice) {
    speech.voice = frenchVoice;
  }

  speechSynthesis.speak(speech);
}

function pauseText() {
  if (speechSynthesis.speaking) {
    speechSynthesis.pause();
  }
}

function stopText() {
  speechSynthesis.cancel();
}

document.getElementById('fileInput').addEventListener('change', function(event) {
  const file = event.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById('text').value = e.target.result;
  };

  reader.readAsText(file);
});
</script>
</body>
</html>
